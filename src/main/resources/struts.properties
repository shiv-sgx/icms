#see http://struts.apache.org/2.0.14/docs/strutsproperties.html

# Production defaults. For local development set devMode=true (verbose errors +
# resource reloading).
struts.devMode=false
#struts.locale=en
#we don't want to show extensions (extensionless action URLs)
struts.action.extension= ,
struts.configuration.xml.reload=false
struts.i18n.reload=false
struts.custom.i18n.resources=global
# Disable dynamic method invocation (security): one action name maps to one method.
struts.enable.DynamicMethodInvocation=false
#struts.enable.SlashesInActionNames=true
