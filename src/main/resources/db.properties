# ============================================================================
# ICMS configuration DEFAULTS (safe for local dev only — NO secrets here).
# Every key is overridable by an environment variable (dot -> underscore,
# uppercased) or a -D system property. In dev/qa/staging/prod, set the DB
# password and URL via the environment, never in this file.
#   db.url       -> DB_URL
#   db.user      -> DB_USER
#   db.password  -> DB_PASSWORD
#   icms.upload.dir -> ICMS_UPLOAD_DIR
# ============================================================================

db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/icms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
db.user=root
db.password=

# HikariCP pool tuning
db.pool.max=10
db.pool.min=2
db.pool.connectionTimeoutMs=30000
db.pool.maxLifetimeMs=1800000
db.pool.initFailTimeoutMs=10000

# Application
icms.page.size=15
# Where uploaded claim documents are stored (outside the WAR). Override per env.
icms.upload.dir=${user.home}/icms-uploads
