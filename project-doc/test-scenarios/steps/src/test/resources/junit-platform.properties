# Cucumber-JVM JUnit 5 Platform configuration.
# Feature files are resolved from the classpath "features/" directory (copied
# from project-doc/test-scenarios/features/ by the Maven build). The glue
# package is "steps" (where all @Given/@When/@Then classes live).
cucumber.features=classpath:features
cucumber.glue=steps
cucumber.plugin=pretty,json:target/cucumber-reports/.cucumber.json,html:target/cucumber-reports/report.html
cucumber.publish.quiet=true
